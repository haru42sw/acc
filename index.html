<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ACC 산출서">
<title>ACC 산출서 v10</title>
<style>
:root{
  --navy:#0f1e35;--navy2:#1a2f4a;--blue:#1e5fa8;
  --accent:#e8a020;--accent2:#f0b840;
  --green:#2a7a4b;--red:#c0392b;
  --bg:#f0f2f5;--bg2:#e4e8ed;--white:#fff;
  --text:#1a1a2e;--text2:#4a5568;--text3:#8a95a3;--border:#d0d8e4;
  --sans:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --mono:'SF Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,.06);}
html{-ms-touch-action:manipulation;touch-action:manipulation;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;}
button,a,[role="button"]{touch-action:manipulation;cursor:pointer;-webkit-user-select:none;user-select:none;}

header{
  background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;
  padding:13px 16px;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:space-between;justify-content:space-between;
  position:-webkit-sticky;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}
.logo{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;}
.logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);flex-shrink:0;}
.logo-text h1{font-size:15px;font-weight:700;}
.logo-text p{font-size:10px;opacity:.55;margin-top:1px;}
.hdr-btns{display:-webkit-flex;display:flex;gap:6px;}

.btn{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:none;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;}
.btn-accent{background:var(--accent);color:var(--navy);}
.btn-ghost{background:rgba(255,255,255,.18);color:#fff;}
.btn:active{opacity:.65;}

.summary{background:var(--white);border-bottom:1px solid var(--border);padding:10px 14px;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:7px;}
.s-item{background:var(--bg);border-radius:8px;padding:8px 10px;-webkit-flex:1;flex:1;min-width:calc(50% - 4px);}
.s-item.grn{background:#eaf4ee;}
.s-item.tot{background:var(--navy);-webkit-flex-basis:100%;flex-basis:100%;border-radius:9px;}
.s-lbl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.s-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--navy);}
.s-item.grn .s-val{color:var(--green);}
.s-item.tot .s-lbl{color:rgba(255,255,255,.55);}
.s-item.tot .s-val{color:var(--accent2);font-size:18px;}

.main{padding:12px;}
.toolbar{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;margin-bottom:10px;}
.sec-ttl{font-size:13px;font-weight:700;color:var(--text2);}
.cnt{background:var(--navy);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:var(--mono);margin-left:6px;}

.item-list{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px;}
.card{background:var(--white);border-radius:10px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(15,30,53,.07);}
.card-head{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;padding:9px 11px;background:var(--bg);border-radius:10px 10px 0 0;border-bottom:1px solid var(--bg2);}
.card-num{width:22px;height:22px;background:var(--navy);border-radius:5px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:var(--mono);flex-shrink:0;}

.pick-btn{-webkit-flex:1;flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;font-family:var(--sans);font-size:12px;color:var(--text);text-align:left;cursor:pointer;-webkit-appearance:none;appearance:none;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;min-height:38px;}
.pick-btn.on{border-color:var(--blue);background:#f5f9ff;}
.pick-btn:active{opacity:.7;}
.pick-lbl{-webkit-flex:1;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none;}
.pick-arr{color:var(--text3);font-size:10px;flex-shrink:0;margin-left:4px;pointer-events:none;}

.del-btn{width:32px;height:32px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;-webkit-appearance:none;appearance:none;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;flex-shrink:0;border-radius:6px;}
.del-btn:active{background:#ffe8e8;color:var(--red);}

.card-info{padding:6px 12px 0;display:-webkit-flex;display:flex;gap:6px;-webkit-align-items:center;align-items:center;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.vb{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;}
.vb-dg{background:#e8f0fe;color:#2e5fb5;}
.vb-ld{background:#e4f4eb;color:#2a7a4b;}
.card-spec{font-size:11px;color:var(--text3);}
.card-sell{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--navy);margin-left:auto;}

.card-body{padding:10px 12px 12px;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;}
.card-field{-webkit-flex:1;flex:1;min-width:calc(33% - 6px);}
.f-lbl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.4px;text-transform:uppercase;display:block;margin-bottom:3px;}
.f-inp{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 6px;font-family:var(--mono);font-size:14px;color:var(--text);background:var(--white);outline:none;text-align:center;-webkit-appearance:none;appearance:none;}
.f-inp:focus{border-color:var(--blue);background:#f5f9ff;}
.cost-row{width:100%;display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;padding:4px 2px 0;font-size:11px;}
.cost-row span{color:var(--text3);}
.cost-row b{color:var(--blue);font-family:var(--mono);}

.add-btn{width:100%;padding:14px;background:var(--white);border:2px dashed var(--border);border-radius:10px;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text3);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;gap:6px;margin-top:6px;-webkit-appearance:none;appearance:none;}
.add-btn:active{background:var(--bg2);border-color:var(--blue);color:var(--blue);}

.empty{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:44px 20px;text-align:center;}
.empty-ico{font-size:38px;margin-bottom:10px;}
.empty-ttl{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.empty-sub{font-size:12px;color:var(--text3);}

.confirm-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:#fff;padding:14px 16px;z-index:2000;border-radius:14px 14px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.3);}
.confirm-bar.show{display:block;}
.confirm-msg{font-size:14px;font-weight:600;margin-bottom:12px;text-align:center;}
.confirm-btns{display:-webkit-flex;display:flex;gap:10px;}
.confirm-btns button{-webkit-flex:1;flex:1;padding:11px;border-radius:8px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:700;-webkit-appearance:none;appearance:none;}
.confirm-yes{background:var(--red);color:#fff;}
.confirm-no{background:rgba(255,255,255,.15);color:#fff;}

.print-guide{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:3000;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:20px;}
.print-guide.show{display:-webkit-flex;display:flex;}
.pg-box{background:#fff;border-radius:14px;padding:24px 20px;max-width:320px;width:100%;text-align:center;}
.pg-box h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--navy);}
.pg-box p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.pg-step{background:var(--bg);border-radius:8px;padding:10px 14px;margin:6px 0;font-size:13px;color:var(--text);text-align:left;}
.pg-btn{width:100%;padding:12px;border:none;border-radius:9px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;margin-top:8px;}
.pg-print{background:var(--blue);color:#fff;margin-bottom:6px;}
.pg-close{background:var(--bg2);color:var(--text2);}

.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.48);z-index:1000;}
.overlay.open{display:block;}
.sheet{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;max-height:82vh;z-index:1001;-webkit-flex-direction:column;flex-direction:column;}
.sheet.open{display:-webkit-flex;display:flex;}
.sheet-handle{width:36px;height:4px;background:var(--bg2);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sheet-head{padding:10px 16px;border-bottom:1px solid var(--bg2);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;flex-shrink:0;}
.sheet-head h3{font-size:14px;font-weight:700;-webkit-flex:1;flex:1;}
.close-btn{width:28px;height:28px;border:none;background:var(--bg);border-radius:50%;font-size:15px;cursor:pointer;-webkit-appearance:none;appearance:none;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;}
.close-btn:active{background:var(--bg2);}
.sheet-search{padding:10px 14px;border-bottom:1px solid var(--bg2);flex-shrink:0;}
.sheet-search input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:15px;font-family:var(--sans);outline:none;background:var(--bg);color:var(--text);-webkit-appearance:none;appearance:none;}
.sheet-search input:focus{border-color:var(--blue);background:#fff;}
.sheet-list{overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-flex:1;flex:1;}
.grp-lbl{padding:8px 16px 3px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;background:var(--bg);border-top:1px solid var(--bg2);position:-webkit-sticky;position:sticky;top:0;z-index:1;}
.m-btn{width:100%;background:none;border:none;border-bottom:1px solid var(--bg2);padding:12px 16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;cursor:pointer;font-family:var(--sans);text-align:left;-webkit-appearance:none;appearance:none;}
.m-btn:active{background:var(--bg);}
.m-name{font-size:13px;color:var(--text);-webkit-flex:1;flex:1;line-height:1.35;pointer-events:none;}
.m-spec{font-size:11px;color:var(--text3);margin-top:1px;pointer-events:none;}
.m-price{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:600;flex-shrink:0;pointer-events:none;}
.no-result{padding:30px;text-align:center;color:var(--text3);font-size:13px;}

.toast{position:fixed;bottom:28px;left:50%;-webkit-transform:translateX(-50%) translateY(12px);transform:translateX(-50%) translateY(12px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;-webkit-transition:opacity .28s,-webkit-transform .28s;transition:opacity .28s,transform .28s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}

/* 잠금 화면 */
.lock{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--navy),#0a1628);z-index:10000;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:20px;}
.lock.hide{display:none;}
.lock-box{background:#fff;border-radius:16px;padding:32px 24px;max-width:300px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.lock-badge{width:56px;height:56px;background:var(--accent);border-radius:14px;display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:16px;font-weight:800;color:var(--navy);margin-bottom:14px;}
.lock-box h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.lock-box p{font-size:12px;color:var(--text3);margin-bottom:18px;}
.lock-inp{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--sans);font-size:16px;text-align:center;outline:none;-webkit-appearance:none;appearance:none;letter-spacing:4px;}
.lock-inp:focus{border-color:var(--blue);background:#f5f9ff;}
.lock-inp.err{border-color:var(--red);background:#fff5f5;-webkit-animation:shake .4s;animation:shake .4s;}
.lock-go{width:100%;padding:13px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;-webkit-appearance:none;appearance:none;margin-top:12px;}
.lock-go:active{opacity:.7;}
.lock-msg{font-size:11px;color:var(--red);margin-top:8px;min-height:16px;}
@-webkit-keyframes shake{0%,100%{-webkit-transform:translateX(0)}25%{-webkit-transform:translateX(-8px)}75%{-webkit-transform:translateX(8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.app-wrap{display:none;}
.app-wrap.show{display:block;}

/* 비밀번호 변경 모달 */
.pw-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:5000;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:20px;}
.pw-modal.show{display:-webkit-flex;display:flex;}
.pw-box{background:#fff;border-radius:14px;padding:24px 20px;max-width:300px;width:100%;text-align:center;}
.pw-box h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.pw-field{margin-bottom:12px;text-align:left;}
.pw-field label{font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;}
.pw-field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--sans);font-size:15px;outline:none;-webkit-appearance:none;appearance:none;}
.pw-field input:focus{border-color:var(--blue);background:#f5f9ff;}
.pw-save{width:100%;padding:12px;border:none;border-radius:9px;background:var(--navy);color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;appearance:none;margin-top:4px;}
.pw-save:active{opacity:.7;}
.pw-cancel{width:100%;padding:12px;border:none;border-radius:9px;background:var(--bg2);color:var(--text2);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;margin-top:6px;}
.pw-cancel:active{opacity:.7;}
.pw-msg{font-size:11px;color:var(--red);margin-top:8px;min-height:16px;}
.pw-ok{color:var(--green);}

/* 디버그 배너 */
.dbg{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#2a7a4b;color:#fff;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.dbg.on{opacity:1;}

@media print{header,.toolbar,.add-btn,.hdr-btns,.del-btn,.overlay,.sheet,.toast,.confirm-bar,.print-guide,.dbg,.lock,.pw-modal{display:none!important;}body{background:#fff;}.app-wrap{display:block!important;}.card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;}.summary{position:static;}}
</style>
</head>
<!-- ★ ontouchstart="" 빈 핸들러 = iOS에서 터치 이벤트 레이어 활성화 필수 트릭 -->
<body ontouchstart="">

<!-- 🔒 잠금 화면 -->
<div class="lock" id="lockScreen">
  <div class="lock-box">
    <div class="lock-badge">ACC</div>
    <h2>ACC 산출서</h2>
    <p>에스브로 S-bro · 비밀번호를 입력하세요</p>
    <input class="lock-inp" id="lockPw" type="password" placeholder="••••" maxlength="20"
      autocomplete="off" autocorrect="off" autocapitalize="off">
    <button class="lock-go" ontouchstart="T_unlock()" onclick="T_unlock()">확인</button>
    <div class="lock-msg" id="lockMsg"></div>
  </div>
</div>

<!-- 앱 본체 (잠금 해제 전 숨김) -->
<div class="app-wrap" id="appWrap">

<header>
  <div class="logo">
    <div class="logo-badge">ACC</div>
    <div class="logo-text"><h1>ACC 산출서</h1><p>에스브로 S-bro · 자재원가 견적</p></div>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-ghost" ontouchstart="T.pwModal()" onclick="T.pwModal()">⚙️</button>
    <button class="btn btn-ghost" ontouchstart="T.clear()" onclick="T.clear()">🗑 초기화</button>
    <button class="btn btn-accent" ontouchstart="T.print()" onclick="T.print()">🖨 출력</button>
  </div>
</header>

<div class="summary">
  <div class="s-item"><div class="s-lbl">소 계 (원가)</div><div class="s-val" id="sC">0 원</div></div>
  <div class="s-item grn"><div class="s-lbl">합 계 (판매가)</div><div class="s-val" id="sS">0 원</div></div>
  <div class="s-item"><div class="s-lbl">부 가 세 10%</div><div class="s-val" id="sV">0 원</div></div>
  <div class="s-item tot"><div class="s-lbl">최 종 견 적 금 액</div><div class="s-val" id="sT">0 원</div></div>
</div>

<main class="main">
  <div class="toolbar">
    <div><span class="sec-ttl">자재 내역</span><span class="cnt" id="cnt">0</span></div>
  </div>
  <div class="item-list" id="itemList"></div>
  <button class="add-btn" ontouchstart="T.add()" onclick="T.add()">＋ 품목 추가</button>
</main>

<!-- 초기화 확인 -->
<div class="confirm-bar" id="confirmBar">
  <div class="confirm-msg">⚠️ 모든 항목을 초기화할까요?</div>
  <div class="confirm-btns">
    <button class="confirm-no" ontouchstart="T.confirmNo()" onclick="T.confirmNo()">취소</button>
    <button class="confirm-yes" ontouchstart="T.confirmYes()" onclick="T.confirmYes()">초기화</button>
  </div>
</div>

<!-- 출력 안내 -->
<div class="print-guide" id="printGuide">
  <div class="pg-box">
    <h3>🖨 출력 / PDF 저장</h3>
    <p>아이폰·아이패드에서는<br>Safari 공유 메뉴를 이용하세요.</p>
    <div class="pg-step">① 하단 공유 버튼 (□↑) 터치</div>
    <div class="pg-step">② "프린트" 또는 "PDF로 저장" 선택</div>
    <button class="pg-btn pg-print" ontouchstart="T.printNow()" onclick="T.printNow()">맥북에서 바로 출력</button>
    <button class="pg-btn pg-close" ontouchstart="T.printClose()" onclick="T.printClose()">닫기</button>
  </div>
</div>

<!-- 모달 오버레이 -->
<div class="overlay" id="overlay" ontouchstart="T.closeModal()" onclick="T.closeModal()"></div>

<!-- 바텀 시트 -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h3>품목 선택</h3>
    <button class="close-btn" ontouchstart="T.closeModal()" onclick="T.closeModal()">✕</button>
  </div>
  <div class="sheet-search">
    <input type="search" id="modalQ" placeholder="🔍 품명 검색..."
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      oninput="T.search(this.value)">
  </div>

/* ── 🔒 비밀번호 시스템 ──
   기본 비밀번호: 1234
   앱 내 ⚙️ 버튼으로 변경 가능 (localStorage에 저장)
   ─────────────────────────────────────── */
var DEFAULT_HASH='03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';

function getPassHash(){
  try{ var h=localStorage.getItem('acc_pw_hash'); return h||DEFAULT_HASH; }
  catch(e){ return DEFAULT_HASH; }
}

async function sha256(str){
  var buf=new TextEncoder().encode(str);
  var hash=await crypto.subtle.digest('SHA-256',buf);
  var arr=Array.from(new Uint8Array(hash));
  return arr.map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

function T_unlock(){
  var pw=document.getElementById('lockPw').value;
  if(!pw){
    document.getElementById('lockMsg').textContent='비밀번호를 입력하세요';
    document.getElementById('lockPw').classList.add('err');
    setTimeout(function(){document.getElementById('lockPw').classList.remove('err');},500);
    return;
  }
  sha256(pw).then(function(h){
    if(h===getPassHash()){
      document.getElementById('lockScreen').classList.add('hide');
      document.getElementById('appWrap').classList.add('show');
    } else {
      document.getElementById('lockMsg').textContent='비밀번호가 틀렸습니다';
      document.getElementById('lockPw').value='';
      document.getElementById('lockPw').classList.add('err');
      setTimeout(function(){document.getElementById('lockPw').classList.remove('err');},500);
      document.getElementById('lockPw').focus();
    }
  });
}

document.getElementById('lockPw').addEventListener('keydown',function(e){

/* ── 계산 ── */
function recalc(){
  var cost=0,sell=0,cnt=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.item&&r.qty>0){cost+=r.item[5]*r.qty;sell+=r.item[5]*r.qty*(1+r.margin);cnt++;}
  }
  var vat=sell*.1;
  document.getElementById('sC').textContent=fmt(cost)+' 원';
  document.getElementById('sS').textContent=fmt(sell)+' 원';
  document.getElementById('sV').textContent=fmt(vat)+' 원';
  document.getElementById('sT').textContent=fmt(sell+vat)+' 원';
  document.getElementById('cnt').textContent=cnt;
}

/* ══════════════════════════════════════════

   — iOS Safari file:// 에서 100% 동작 보장
   ══════════════════════════════════════════ */
function render(){
  var list=document.getElementById('itemList');
  if(!rows.length){
    list.innerHTML='<div class="empty"><div class="empty-ico">📋</div><div class="empty-ttl">품목을 추가해서 견적을 작성하세요</div><div class="empty-sub">아래 ＋ 품목 추가를 눌러주세요</div></div>';
    recalc();return;
  }
  var h='';
  for(var i=0;i<rows.length;i++){
    var r=rows[i],it=r.item;
    var sell=(it&&r.qty>0)?Math.round(it[5]*r.qty*(1+r.margin)):0;
    var vc=it?(it[1]==='대광'?'vb-dg':'vb-ld'):'';
    h+='<div class="card"><div class="card-head">';
    h+='<div class="card-num">'+(i+1)+'</div>';
    /* ★ 인라인 ontouchstart + onclick */
    h+='<button class="pick-btn'+(it?' on':'')+'" ontouchstart="T.pick('+r.id+')" onclick="T.pick('+r.id+')">';
    h+='<span class="pick-lbl">'+(it?it[3]:'<span style="color:#8a95a3">품명 선택</span>')+'</span>';
    h+='<span class="pick-arr">▼</span></button>';
    h+='<button class="del-btn" ontouchstart="T.del('+r.id+')" onclick="T.del('+r.id+')">✕</button>';
    h+='</div>';
    if(it){
      h+='<div class="card-info"><span class="vb '+vc+'">'+it[1]+'</span>';
      if(it[4])h+='<span class="card-spec">'+it[4]+'</span>';
      if(sell>0)h+='<span class="card-sell">'+fmt(sell)+' 원</span>';
      h+='</div>';
    }
    h+='<div class="card-body">';
    /* input은 oninput/onchange 인라인 사용 */
    h+='<div class="card-field"><label class="f-lbl">수 량</label>';
    h+='<input class="f-inp" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="0" value="'+(r.qty||'')+'" oninput="T.qty('+r.id+',this)" onchange="T.qtyDone('+r.id+',this)"></div>';
    h+='<div class="card-field"><label class="f-lbl">단 위</label>';
    h+='<input class="f-inp" type="text" placeholder="EA" value="'+(r.unit||'')+'" onchange="T.unit('+r.id+',this)"></div>';
    h+='<div class="card-field"><label class="f-lbl">마진율 %</label>';
    h+='<input class="f-inp" type="tel" inputmode="numeric" pattern="[0-9]*" value="'+Math.round(r.margin*100)+'" onchange="T.margin('+r.id+',this)"></div>';
    if(it)h+='<div class="cost-row"><span>단가: '+fmt(it[5])+'원</span><span>원가합계: <b>'+fmt(it[5]*(r.qty||0))+'원</b></span></div>';
    h+='</div></div>';
  }
  list.innerHTML=h;
  recalc();
}

}
function buildSheet(q){
  var query=(q||'').toLowerCase().trim();
  var grouped={},keys=[];
  for(var i=0;i<DB.length;i++){
    var it=DB[i];
    var key=it[1]+' · '+it[2];
    var s=(it[3]+' '+it[4]+' '+it[1]+' '+it[2]).toLowerCase();
    if(!query||s.indexOf(query)!==-1){
      if(!grouped[key]){grouped[key]=[];keys.push(key);}
      grouped[key].push(it);
    }
  }
  var h='';
  if(!keys.length){h='<div class="no-result">검색 결과가 없습니다</div>';}
  else{
    for(var k=0;k<keys.length;k++){
      h+='<div class="grp-lbl">'+keys[k]+'</div>';
      var items=grouped[keys[k]];
      for(var m=0;m<items.length;m++){
        var it2=items[m];
        /* ★ 모달 품목: onclick만 사용 — ontouchstart는 스크롤과 충돌 */
        h+='<button class="m-btn" onclick="T.sel(\''+it2[0]+'\')">';
        h+='<div style="-webkit-flex:1;flex:1;pointer-events:none"><div class="m-name">'+it2[3]+'</div>';
        if(it2[4])h+='<div class="m-spec">'+it2[4]+'</div>';
        h+='</div><div class="m-price" style="pointer-events:none">'+fmt(it2[5])+'원</div></button>';
      }
    }
  }
  document.getElementById('sheetList').innerHTML=h;
}

/* ══════════════════════════════════════════
   ★ T 객체: 모든 인라인 핸들러의 진입점
   — 전역 네임스페이스로 깔끔하게 관리
   — ontouchstart / onclick 중복 실행 방지
   ══════════════════════════════════════════ */
var _lock=0;
function guard(){
  var now=Date.now();
  if(now-_lock<350) return true; /* 중복 차단 */
  _lock=now;
  return false;
}

var T={
  /* 품목 선택 모달 열기 */
  pick: function(id){
    if(guard()) return;
    openModal(id);
  },
  /* 항목 삭제 */
  del: function(id){
    if(guard()) return;
    rows=rows.filter(function(r){return r.id!==id;});
    render();
  },
  /* 수량 실시간 입력 */
  qty: function(id,el){
    var r=getRow(id);
    if(r){r.qty=parseInt(el.value)||0; recalc();}
  },
  /* 수량 확정 (change) */
  qtyDone: function(id,el){
    var r=getRow(id);
    if(r){r.qty=parseInt(el.value)||0; render();}
  },
  /* 단위 */
  unit: function(id,el){
    var r=getRow(id);
    if(r) r.unit=el.value;
  },
  /* 마진율 */
  margin: function(id,el){
    var r=getRow(id);
    if(r){r.margin=(parseInt(el.value)||0)/100; recalc(); render();}
  },
  /* 모달에서 품목 선택 */
  sel: function(code){
    if(guard()) return;
    var item=dbByCode(code);
    if(!item||editId===null) return;
    var row=getRow(editId);
    if(!row) return;
    row.item=item; row.margin=item[6];
    if(!row.unit) row.unit='EA';
    closeModal(); render();
  },
  /* 품목 추가 */
  add: function(){
    if(guard()) return;
    var id=nextId++;
    rows.push({id:id,item:null,qty:0,unit:'EA',margin:.35});
    render();
    setTimeout(function(){openModal(id);},80);
  },
  /* 초기화 */
  clear: function(){
    if(guard()) return;
    if(!rows.length){showToast('항목이 없습니다');return;}
    document.getElementById('confirmBar').classList.add('show');
  },
  confirmNo: function(){
    if(guard()) return;
    document.getElementById('confirmBar').classList.remove('show');
  },
  confirmYes: function(){
    if(guard()) return;
    document.getElementById('confirmBar').classList.remove('show');
    rows=[];nextId=1;render();showToast('초기화되었습니다');
  },
  /* 출력 */
  print: function(){
    if(guard()) return;
    var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isIOS){document.getElementById('printGuide').classList.add('show');}
    else{window.print();}
  },
  printNow: function(){
    if(guard()) return;
    document.getElementById('printGuide').classList.remove('show');
    setTimeout(function(){window.print();},100);
  },
  printClose: function(){
    if(guard()) return;
    document.getElementById('printGuide').classList.remove('show');
  },
  /* 모달 닫기 */
  closeModal: function(){
    if(guard()) return;
    closeModal();
  },
  /* 검색 */
  search: function(val){
    buildSheet(val);
  },
  /* ── 비밀번호 변경 ── */
  pwModal: function(){
    if(guard()) return;
    document.getElementById('pwCur').value='';
    document.getElementById('pwNew').value='';
    document.getElementById('pwNew2').value='';
    document.getElementById('pwMsg').textContent='';
    document.getElementById('pwMsg').classList.remove('pw-ok');
    document.getElementById('pwModal').classList.add('show');
  },
  pwClose: function(){
    if(guard()) return;
    document.getElementById('pwModal').classList.remove('show');
  },
  pwSave: function(){
    if(guard()) return;
    var cur=document.getElementById('pwCur').value;
    var nw=document.getElementById('pwNew').value;
    var nw2=document.getElementById('pwNew2').value;
    var msg=document.getElementById('pwMsg');
    msg.classList.remove('pw-ok');

    if(!cur){msg.textContent='현재 비밀번호를 입력하세요';return;}
    if(!nw){msg.textContent='새 비밀번호를 입력하세요';return;}
    if(nw.length<4){msg.textContent='4자리 이상 입력하세요';return;}
    if(nw!==nw2){msg.textContent='새 비밀번호가 일치하지 않습니다';return;}

    sha256(cur).then(function(h){
      if(h!==getPassHash()){
        msg.textContent='현재 비밀번호가 틀렸습니다';
        return;
      }
      sha256(nw).then(function(newH){
        try{localStorage.setItem('acc_pw_hash',newH);}catch(e){}
        msg.classList.add('pw-ok');
        msg.textContent='✓ 비밀번호가 변경되었습니다';
        setTimeout(function(){
          document.getElementById('pwModal').classList.remove('show');
        },1200);
      });
    });
  }
};

/* ── 초기 렌더링 ── */
render();
recalc();
dbg('v10 로드 완료');
</script>
</body>
